name: Feature request
description: Propose a new capability or improvement for DataLens
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Strong requests explain the problem first, then the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point, limitation, or missing workflow are you hitting today?
      placeholder: I can export raw query results, but I cannot package multiple charts and notes into a reusable analysis bundle.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
      placeholder: Add a saved workspace export that bundles charts, filters, SQL, and notes into one shareable artifact.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you tried?
      placeholder: I currently export charts one by one and store SQL in a separate file.
    validations:
      required: false

  - type: textarea
    id: use_case
    attributes:
      label: Use case and impact
      description: Who benefits from this and how would it change the workflow?
      placeholder: Analysts could hand off complete local analysis sessions without sending raw data to a cloud service.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this request for your workflow?
      options:
        - Nice to have
        - Important
        - High priority
        - Critical blocker
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add references, screenshots, mockups, or related tools if helpful.
    validations:
      required: false
