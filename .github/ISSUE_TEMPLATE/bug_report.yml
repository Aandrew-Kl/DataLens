name: Bug report
description: Report a reproducible problem in DataLens
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug and what part of the app is affected.
      placeholder: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Go to ...
        2. Upload or click ...
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen instead.
      placeholder: The app should...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: Describe what actually happened.
      placeholder: Instead, the app...
    validations:
      required: true

  - type: input
    id: browser_os
    attributes:
      label: Browser / OS
      description: Include browser version and operating system.
      placeholder: Chrome 135 on macOS 15.4
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots, recordings, or pasted error output if helpful.
      placeholder: Drag images here or paste links/logs.
    validations:
      required: false
