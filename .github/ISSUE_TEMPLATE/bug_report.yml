name: Bug report
description: Report a reproducible issue in DataLens
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for someone else to reproduce it quickly.

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: Describe the issue in one or two clear sentences.
      placeholder: DataLens crashes when I run a SQL query after importing a JSON file.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps required to trigger the bug.
      placeholder: |
        1. Open DataLens
        2. Upload ...
        3. Click ...
        4. Run ...
        5. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The query should complete and render a result table.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The page shows an error boundary with "Failed to generate query".
    validations:
      required: true

  - type: textarea
    id: dataset_context
    attributes:
      label: Dataset and context
      description: Share file type, approximate size, column shape, and whether Ollama was enabled.
      placeholder: CSV, 25 MB, 14 columns, Ollama running with llama3.2.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, OS, DataLens version or commit, and Docker/local setup if relevant.
      placeholder: |
        Browser: Chrome 135
        OS: macOS 15.4
        DataLens: main@abcdef1
        Setup: npm run dev
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error messages or logs
      description: Paste console output, terminal logs, stack traces, or screenshots of errors.
      placeholder: Paste any useful logs here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag images here or paste links to recordings if they help explain the issue.
    validations:
      required: false
