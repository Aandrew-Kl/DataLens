name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage threshold
        # `--coverage` enforces jest.config.ts coverageThreshold (hard-fail).
        # Ratchet floors prevent backslide while Phase 2/3/4 of quality-to-11
        # raise real coverage numbers.
        run: npm test -- --ci --coverage --passWithNoTests

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      JWT_SECRET: ci-test-secret
      OLLAMA_URL: http://localhost:11434

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Security audit
        run: pip install safety && safety check --output text || true

      - name: Run backend tests with coverage gate
        # Coverage gate is defined in backend/pyproject.toml (60% floor,
        # ratchet strategy — raise per wave as the FE coverage config does).
        run: cd backend && python -m pytest tests/ -v --tb=short

  security:
    runs-on: ubuntu-latest
    # Non-blocking: requires "Code scanning" to be enabled in repo Settings >
    # Code security. Until then the analyze step errors out. Do not gate
    # merges on this job.
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

  e2e:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run E2E tests (smoke + auth)
        run: npx playwright test smoke.spec.ts auth.spec.ts --reporter=list

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
