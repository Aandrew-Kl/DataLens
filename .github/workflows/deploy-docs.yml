name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Prevent overlapping deploys stomping on each other.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Matches basePath in next.config.mjs and the gh-pages destination_dir.
          DOCS_BASE_PATH: /DataLens/docs

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Deploy to GitHub Pages
        # Third-party action with contents:write — pinned to a commit SHA
        # so a moved tag cannot push arbitrary content to the repo.
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-site/out
          destination_dir: docs
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'docs: deploy from ${{ github.sha }}'
