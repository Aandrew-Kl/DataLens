name: Load Test

on:
  workflow_dispatch:

jobs:
  query-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite+aiosqlite:///file:datalens-loadtest?mode=memory&cache=shared&uri=true
      JWT_SECRET: load-test-secret
      OLLAMA_URL: http://127.0.0.1:11434
      PYTHONPATH: ${{ github.workspace }}/backend
      UPLOADS_DIR: ${{ github.workspace }}/backend/uploads-load-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-load-test-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-load-test-

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start backend
        run: |
          mkdir -p load-tests/results
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > load-tests/results/backend.log 2>&1 &
          echo $! > load-tests/results/backend.pid

      - name: Wait for backend health
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          tail -n 200 load-tests/results/backend.log || true
          exit 1

      - name: Run query load test
        env:
          BASE_URL: http://127.0.0.1:8000/api
        run: k6 run --summary-export=load-tests/results/query-summary.json load-tests/query.k6.js

      - name: Publish k6 summary
        if: ${{ always() }}
        run: |
          if [ ! -f load-tests/results/query-summary.json ]; then
            echo "k6 summary was not generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          p50=$(jq -r '.metrics["http_req_duration{endpoint:ai_generate_query}"]["p(50)"] // .metrics["http_req_duration{endpoint:ai_generate_query}"].med // .metrics.http_req_duration["p(50)"] // .metrics.http_req_duration.med // "n/a"' load-tests/results/query-summary.json)
          p95=$(jq -r '.metrics["http_req_duration{endpoint:ai_generate_query}"]["p(95)"] // .metrics.http_req_duration["p(95)"] // "n/a"' load-tests/results/query-summary.json)
          error_rate=$(jq -r '.metrics["http_req_failed{endpoint:ai_generate_query}"].rate // .metrics["http_req_failed{endpoint:ai_generate_query}"].value // .metrics.http_req_failed.rate // .metrics.http_req_failed.value // "n/a"' load-tests/results/query-summary.json)
          requests=$(jq -r '.metrics["http_reqs{endpoint:ai_generate_query}"].count // .metrics.http_reqs.count // "n/a"' load-tests/results/query-summary.json)

          {
            echo "## k6 query baseline"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Requests | ${requests} |"
            echo "| p50 latency | ${p50} ms |"
            echo "| p95 latency | ${p95} ms |"
            echo "| Error rate | ${error_rate} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload load test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: query-load-test
          path: load-tests/results/
          retention-days: 7

      - name: Stop backend
        if: ${{ always() }}
        run: |
          if [ -f load-tests/results/backend.pid ]; then
            kill "$(cat load-tests/results/backend.pid)" || true
          fi
