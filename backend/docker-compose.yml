services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/datalens
      ENVIRONMENT: production
      # Required from the host environment or a .env file — the app refuses
      # known-weak values. Generate with: openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET (generate with: openssl rand -hex 32)}
      OLLAMA_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      # Host-only: the DB ships with default credentials and must not be
      # reachable from outside the box. The backend connects over the
      # compose network, not this binding.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: datalens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datalens"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
