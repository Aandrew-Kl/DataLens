services:
  frontend:
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    command: npm run dev
    environment:
      - NODE_ENV=development

  backend:
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ENVIRONMENT=development

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@datalens.dev
      - PGADMIN_DEFAULT_PASSWORD=admin
