<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
  <rect width="1280" height="720" rx="32" fill="#020617"/>
  <rect x="56" y="56" width="1168" height="608" rx="30" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <rect x="96" y="112" width="1088" height="300" rx="20" fill="#111827"/>
  <rect x="96" y="448" width="1088" height="160" rx="20" fill="#0B1220"/>
  <text x="136" y="180" fill="#38BDF8" font-family="Courier New, monospace" font-size="28">SELECT region, SUM(revenue) AS total_revenue</text>
  <text x="136" y="224" fill="#E2E8F0" font-family="Courier New, monospace" font-size="28">FROM "sales"</text>
  <text x="136" y="268" fill="#E2E8F0" font-family="Courier New, monospace" font-size="28">GROUP BY region</text>
  <text x="136" y="312" fill="#E2E8F0" font-family="Courier New, monospace" font-size="28">ORDER BY total_revenue DESC;</text>
  <rect x="980" y="128" width="164" height="54" rx="14" fill="#0284C7"/>
  <text x="1062" y="163" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Run query</text>
  <text x="136" y="506" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="30" font-weight="700">Result preview</text>
  <text x="136" y="554" fill="#94A3B8" font-family="Arial, sans-serif" font-size="22">region</text>
  <text x="420" y="554" fill="#94A3B8" font-family="Arial, sans-serif" font-size="22">total_revenue</text>
  <text x="136" y="596" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="22">EMEA</text>
  <text x="420" y="596" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="22">4,218,900</text>
</svg>
